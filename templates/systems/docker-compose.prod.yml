services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: {{PROJECT_NAME}}-backend:latest
    container_name: {{PROJECT_NAME}}-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "{{BACKEND_PORT}}:{{BACKEND_PORT}}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:{{BACKEND_PORT}}/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: {{PROJECT_NAME}}-frontend:latest
    container_name: {{PROJECT_NAME}}-frontend
    restart: unless-stopped
    ports:
      - "{{FRONTEND_PORT}}:80"
    depends_on:
      backend:
        condition: service_healthy
