[platformio]
default_envs = {{ESP32_VARIANT}}

[env]
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_unflags = -std=gnu++11

[env:esp32]
platform = espressif32
board = esp32dev

[env:esp32s2]
platform = espressif32
board = esp32-s2-saola-1

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitc-02

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
    -DUNIT_TEST
